<!DOCTYPE html>
<html lang="ko">

<head>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css">

  <title>기술 검색기</title>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">PoDB</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="index.html">포켓몬 검색</a>
        </li>
        <li class="nav-item active">
          <a class="nav-link" href="move-search.html">기술 검색</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="stats-calculator.html">실능 계산</a>
        </li>
      </ul>
      <ul class="navbar-nav ml-auto">
        <li class="nav-item">
          <button id="theme-toggle" class="btn btn-outline-secondary btn-sm rounded-circle shadow-sm"
            style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-moon"></i>
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="text-center mb-5">
      <h1 class="font-weight-bold" style="color: var(--primary-color);">SV 기술 검색</h1>
      <div class="mt-3">
        <button type="button" class="btn btn-info btn-sm rounded-pill px-3 shadow-sm" data-toggle="modal"
          data-target="#helpModal">
          <i class="fas fa-question-circle"></i> 도움말
        </button>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-12 col-md-8 mb-3 mb-md-0">
        <div class="suggestion-container w-100">
          <input type="text" id="move-name-input" class="form-control form-control-lg shadow-sm"
            placeholder="기술 이름을 입력하세요..." style="border-radius: 30px; padding-left: 25px;">
        </div>
      </div>
      <div class="col-12 col-md-2">
        <button type="button" class="btn btn-primary btn-lg w-100 shadow-sm" onclick="searchMove()"
          style="border-radius: 30px; font-weight: bold;">검색</button>
      </div>
    </div>
    <div id="result" class="result-container mt-4"></div>
  </div>

  <!-- 검색 결과 표시 창 -->
  <div id="search-results" class="search-results mt-4" style="display: none;">
    <div class="card">
      <div class="card-header">
        <h5 class="mb-0">검색 결과</h5>
      </div>
      <div class="card-body">
        <div class="row" id="result-items">
          <!-- 검색 결과 아이템들이 여기에 동적으로 추가됩니다 -->
        </div>
        <div id="no-results" class="no-results text-center mt-3" style="display: none;">
          <p>검색 결과가 없습니다.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 모달 창 -->
  <div class="modal fade" id="helpModal" tabindex="-1" role="dialog" aria-labelledby="helpModalLabel"
    aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content border-0 rounded-lg shadow">
        <div class="modal-header border-bottom-0">
          <h5 class="modal-title font-weight-bold" id="helpModalLabel" style="color: var(--primary-color);">도움말</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body text-center py-4">
          기술명으로 검색 시 해당 기술을 배우는 포켓몬을 표시합니다.
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center mt-5 mb-4">
    <div class="creator-info">문의 : 메일 lmisdreavus@gmail.com</div>
  </footer>

  <script src="move-search.js"></script>
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.9.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="theme.js"></script>
  <script src="updates.js"></script>
</body>

</html>
