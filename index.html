<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>PoDB</title>
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* 모바일 실능계산기 화면 대응 */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    @media (max-width: 576px) {
      input[type="number"] {
        font-size: 14px;
        padding: 4px;
      }

      .table th,
      .table td {
        font-size: 14px;
        padding: 4px;
      }

      .btn {
        font-size: 14px;
        padding: 4px 8px;
      }

      .form-control {
        font-size: 14px;
        padding: 4px;
      }

      #pokemon-name-input {
        font-size: 14px;
        padding: 4px;
      }

      #search-btn {
        font-size: 14px;
        padding: 4px 8px;
      }

      #level-input {
        font-size: 14px;
        padding: 4px;
      }

      #level-50,
      #level-100 {
        font-size: 14px;
        padding: 4px 8px;
      }

      #calculate-btn {
        font-size: 14px;
        padding: 4px 8px;
      }

      .table th {
        white-space: nowrap;
        text-align: center;
        vertical-align: middle;
      }

      .table thead th {
        white-space: nowrap;
        text-align: center;
        vertical-align: middle;
      }

      .table td {
        text-align: center;
        vertical-align: middle;
      }

      .table input[type="number"] {
        text-align: center;
      }

      .table select.form-control {
        text-align-last: center;
      }

      body {
        padding-bottom: 30px;
      }

      .container {
        margin-top: 30px;
      }
    }

    /* 싱글 페이지 라우팅 스타일 */
    .spa-page {
      display: none;
      margin-bottom: 50px;
    }

    .spa-page.active {
      display: block;
      animation: fadeIn 0.4s ease-out;
    }

    .nav-link.active {
      font-weight: bold;
      color: var(--primary-color) !important;
    }
  </style>
</head>

<body>
  <!-- 공통 최상단 네비게이션 -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top">
    <a class="navbar-brand font-weight-bold" href="#sv" style="color: var(--primary-color);">PoDB</a>
    <button class="navbar-toggler" type="button" id="mobileMenuToggler">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="custom-mobile-menu" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link nav-spa active" id="nav-sv" href="#sv">포켓몬 검색</a></li>
        <li class="nav-item"><a class="nav-link nav-spa" id="nav-move" href="#move">기술</a></li>
        <li class="nav-item"><a class="nav-link nav-spa" id="nav-stats" href="#stats">실능 계산</a></li>
      </ul>
      <ul class="navbar-nav ml-auto">
        <li class="nav-item">
          <button id="theme-toggle" class="btn btn-outline-secondary btn-sm rounded-circle shadow-sm"
            style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-moon"></i>
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- PAGE 1: SV 포켓몬 도감 (#sv) -->
  <div id="page-sv" class="spa-page active">
    <!-- SV 페이지 본문 -->
    <div class="container mt-5">
      <div class="text-center mb-5">
        <h1 class="font-weight-bold text-sv">SV 포켓몬 도감</h1>
        <div class="mt-3">
          <button type="button" class="btn btn-info btn-sm rounded-pill px-3 shadow-sm" data-toggle="modal"
            data-target="#helpModal">
            <i class="fas fa-question-circle"></i> 도움말
          </button>
          <a href="#usum" class="btn btn-sv btn-sm rounded-pill px-3 ml-2 shadow-sm font-weight-bold">7세대(USUM) 도감으로
            이동</a>
        </div>
      </div>
      <div class="row justify-content-center">
        <!-- 검색창 ID 변경: search -> search-sv -->
        <div class="col-12 col-md-8 mb-3 mb-md-0">
          <input type="text" id="search-sv" class="form-control form-control-lg shadow-sm"
            placeholder="포켓몬 이름을 입력하세요..." autocomplete="off" style="border-radius: 30px; padding-left: 25px;">
        </div>
        <div class="col-12 col-md-2">
          <button id="search-button-sv" class="btn btn-primary btn-lg w-100 shadow-sm"
            style="border-radius: 30px; font-weight: bold;">검색</button>
        </div>
      </div>
      <div id="result-sv" class="result-container mt-4"></div>
    </div>
  </div>

  <!-- PAGE 2: USUM 포켓몬 도감 (#usum) -->
  <div id="page-usum" class="spa-page">
    <div class="container mt-5">
      <div class="text-center mb-5">
        <h1 class="font-weight-bold text-usum">USUM 포켓몬 도감</h1>
        <div class="mt-3">
          <button type="button" class="btn btn-info btn-sm rounded-pill px-3 shadow-sm" data-toggle="modal"
            data-target="#helpModal">
            <i class="fas fa-question-circle"></i> 도움말
          </button>
          <a href="#sv" class="btn btn-usum btn-sm rounded-pill px-3 ml-2 shadow-sm font-weight-bold">9세대(SV) 도감으로
            돌아가기</a>
        </div>
      </div>
      <div class="row justify-content-center">
        <!-- 검색창 ID 변경: search -> search-usum -->
        <div class="col-12 col-md-8 mb-3 mb-md-0">
          <input type="text" id="search-usum" class="form-control form-control-lg shadow-sm"
            placeholder="포켓몬 이름을 입력하세요..." autocomplete="off" style="border-radius: 30px; padding-left: 25px;">
        </div>
        <div class="col-12 col-md-2">
          <button id="search-button-usum" class="btn btn-primary btn-lg w-100 shadow-sm"
            style="border-radius: 30px; font-weight: bold;">검색</button>
        </div>
      </div>
      <div id="result-usum" class="result-container mt-4"></div>
    </div>
  </div>
  <!-- PAGE 3: 기술 검색 기 (#move) -->
  <div id="page-move" class="spa-page">
    <div class="container mt-5">
      <div class="text-center mb-5">
        <h1 class="font-weight-bold" style="color: var(--primary-color);">기술 검색</h1>
        <div class="mt-3">
          <!-- 모달 타겟 분리: helpModalMove -->
          <button type="button" class="btn btn-info btn-sm rounded-pill px-3 shadow-sm" data-toggle="modal"
            data-target="#helpModalMove">
            <i class="fas fa-question-circle"></i> 도움말
          </button>
        </div>
      </div>

      <!-- 세대(버전) 선택 토글 -->
      <div class="row justify-content-center mb-4">
        <div class="col-12 text-center">
          <div class="btn-group btn-group-toggle shadow-sm" data-toggle="buttons"
            style="border-radius: 30px; overflow: hidden;">
            <label class="btn btn-outline-primary active px-4 font-weight-bold" style="border-color: #6a2c91;">
              <input type="radio" name="moveSearchVersion" id="moveSearchSV" value="sv" autocomplete="off" checked> 9세대
              (SV)
            </label>
            <label class="btn btn-outline-primary px-4 font-weight-bold" style="border-color: #6a2c91;">
              <input type="radio" name="moveSearchVersion" id="moveSearchUSUM" value="usum" autocomplete="off"> 7세대
              (USUM)
            </label>
          </div>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-12 col-md-8 mb-3 mb-md-0">
          <div class="suggestion-container w-100">
            <input type="text" id="move-name-input" class="form-control form-control-lg shadow-sm"
              placeholder="기술 이름을 입력하세요..." autocomplete="off" style="border-radius: 30px; padding-left: 25px;">
          </div>
        </div>
        <div class="col-12 col-md-2">
          <button type="button" class="btn btn-primary btn-lg w-100 shadow-sm" onclick="searchMove()"
            style="border-radius: 30px; font-weight: bold;">검색</button>
        </div>
      </div>
      <div id="result" class="result-container mt-4"></div>
    </div>

    <!-- 검색 결과 표시 창 -->
    <div id="search-results" class="search-results mt-4 container" style="display: none;">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="mb-0">검색 결과</h5>
          <span id="move-search-count" class="badge badge-primary badge-pill"
            style="font-size: 1rem; display: none;"></span>
        </div>
        <div class="card-body p-2 p-md-4">
          <div class="row mx-n1 mx-md-n3" id="result-items">
            <!-- 검색 결과 아이템들이 여기에 동적으로 추가됩니다 -->
          </div>
          <div id="no-results" class="no-results text-center mt-3" style="display: none;">
            <p>검색 결과가 없습니다.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 모달 창 (move search 전용) -->
    <div class="modal fade" id="helpModalMove" tabindex="-1" role="dialog" aria-labelledby="helpModalLabel"
      aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content border-0 rounded-lg shadow">
          <div class="modal-header border-bottom-0">
            <h5 class="modal-title font-weight-bold" id="helpModalLabel" style="color: var(--primary-color);">도움말</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body text-center py-4">
            <p>기술명으로 검색 시 해당 기술을 배우는 포켓몬을 표시합니다.</p>
            클릭시 포켓몬 검색 화면으로 넘어갑니다.
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE 4: 실능 계산기 (#stats) -->
  <div id="page-stats" class="spa-page">
    <div class="container mt-5">
      <div class="text-center mb-5">
        <h1 class="font-weight-bold" style="color: var(--primary-color);">SV 실능치 계산기</h1>
      </div>
      <div class="card p-4 shadow-sm" style="border-radius: 16px;">
        <div class="row">
          <div class="col-md-3 mb-3">
            <label for="level-input" class="font-weight-bold">레벨:</label>
            <div class="input-group">
              <input type="number" id="level-input" class="form-control" value="50" min="1" max="100"
                style="border-radius: 8px 0 0 8px;">
              <div class="input-group-append">
                <button class="btn btn-outline-secondary" type="button" id="level-50">50</button>
                <button class="btn btn-outline-secondary" type="button" id="level-100"
                  style="border-radius: 0 8px 8px 0;">100</button>
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-5 mb-4">
            <label for="pokemon-name-input" class="font-weight-bold">포켓몬 이름:</label>
            <div class="input-group">
              <input type="text" id="pokemon-name-input" class="form-control shadow-sm" placeholder="포켓몬 이름을 입력하세요..."
                style="border-radius: 8px 0 0 8px;">
              <div class="input-group-append">
                <button class="btn btn-primary shadow-sm" id="search-btn"
                  style="border-radius: 0 8px 8px 0; font-weight:bold;">검색</button>
              </div>
            </div>
            <!-- 유사 결과 리스트 -->
            <div class="list-group position-absolute top-100" id="pokemon-search-results"
              style="width: 100%; z-index: 1000; display: none;"></div>
          </div>
        </div>

        <!-- 능력치 테이블 -->
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th scope="col"></th>
                <th scope="col">종족값</th>
                <th scope="col">개체값</th>
                <th scope="col">노력치</th>
                <th scope="col">성격</th>
                <th scope="col">랭크</th>
                <th scope="col">실수치</th>
              </tr>
            </thead>
            <tbody>
              <!-- 체력 -->
              <tr>
                <th class="col-1.5" scope="row">체력</th>
                <td class="col-2"><input type="number" id="base-hp" class="form-control"></td>
                <td class="col-2"><input type="number" id="iv-hp" class="form-control" value="31" min="0" max="31"></td>
                <td class="col-2">
                  <div class="input-group">
                    <input type="number" id="ev-hp" class="form-control" value="0" min="0" max="252">
                    <div class="input-group-append">
                      <button class="btn btn-outline-secondary btn-sm" type="button" id="ev-hp-min">0</button>
                      <button class="btn btn-outline-secondary btn-sm" type="button" id="ev-hp-max">252</button>
                    </div>
                  </div>
                </td>
                <td class="col-2"></td>
                <td class="col-2"></td>
                <td id="result-hp" class="font-weight-bold" style="color:var(--primary-color);"></td>
              </tr>
              <!-- 공격 -->
              <tr>
                <th scope="row">공격</th>
                <td><input type="number" id="base-attack" class="form-control"></td>
                <td><input type="number" id="iv-attack" class="form-control" value="31" min="0" max="31"></td>
                <td class="col-2">
                  <div class="input-group">
                    <input type="number" id="ev-attack" class="form-control" value="0" min="0" max="252">
                    <div class="input-group-append">
                      <button class="btn btn-outline-secondary btn-sm" type="button" id="ev-attack-min">0</button>
                      <button class="btn btn-outline-secondary btn-sm" type="button" id="ev-attack-max">252</button>
                    </div>
                  </div>
                </td>
                <td>
                  <select class="form-control" id="nature-modifier-attack">
                    <option value="1.1">↑</option>
                    <option value="1.0" selected>-</option>
                    <option value="0.9">↓</option>
                  </select>
                </td>
                <td>
                  <select class="form-control" id="rank-modifier-attack">
                    <option value="6">6</option>
                    <option value="5">5</option>
                    <option value="4">4</option>
                    <option value="3">3</option>
                    <option value="2">2</option>
                    <option value="1">1</option>
                    <option value="0" selected>0</option>
                    <option value="-1">-1</option>
                    <option value="-2">-2</option>
                    <option value="-3">-3</option>
                    <option value="-4">-4</option>
                    <option value="-5">-5</option>
                    <option value="-6">-6</option>
                  </select>
                </td>
                <td id="result-attack" class="font-weight-bold" style="color:var(--primary-color);"></td>
              </tr>
              <!-- 방어 -->
              <tr>
                <th scope="row">방어</th>
                <td><input type="number" id="base-defense" class="form-control"></td>
                <td><input type="number" id="iv-defense" class="form-control" value="31" min="0" max="31"></td>
                <td class="col-2">
                  <div class="input-group">
                    <input type="number" id="ev-defense" class="form-control" value="0" min="0" max="252">
                    <div class="input-group-append">
                      <button class="btn btn-outline-secondary btn-sm" type="button" id="ev-defense-min">0</button>
                      <button class="btn btn-outline-secondary btn-sm" type="button" id="ev-defense-max">252</button>
                    </div>
                  </div>
                </td>
                <td>
                  <select class="form-control" id="nature-modifier-defense">
                    <option value="1.1">↑</option>
                    <option value="1.0" selected>-</option>
                    <option value="0.9">↓</option>
                  </select>
                </td>
                <td>
                  <select class="form-control" id="rank-modifier-defense">
                    <option value="6">6</option>
                    <option value="5">5</option>
                    <option value="4">4</option>
                    <option value="3">3</option>
                    <option value="2">2</option>
                    <option value="1">1</option>
                    <option value="0" selected>0</option>
                    <option value="-1">-1</option>
                    <option value="-2">-2</option>
                    <option value="-3">-3</option>
                    <option value="-4">-4</option>
                    <option value="-5">-5</option>
                    <option value="-6">-6</option>
                  </select>
                </td>
                <td id="result-defense" class="font-weight-bold" style="color:var(--primary-color);"></td>
              </tr>
              <!-- 특공 -->
              <tr>
                <th scope="row">특공</th>
                <td><input type="number" id="base-spAttack" class="form-control"></td>
                <td><input type="number" id="iv-spAttack" class="form-control" value="31" min="0" max="31"></td>
                <td class="col-2">
                  <div class="input-group">
                    <input type="number" id="ev-spAttack" class="form-control" value="0" min="0" max="252">
                    <div class="input-group-append">
                      <button class="btn btn-outline-secondary btn-sm" type="button" id="ev-spAttack-min">0</button>
                      <button class="btn btn-outline-secondary btn-sm" type="button" id="ev-spAttack-max">252</button>
                    </div>
                  </div>
                </td>
                <td>
                  <select class="form-control" id="nature-modifier-spAttack">
                    <option value="1.1">↑</option>
                    <option value="1.0" selected>-</option>
                    <option value="0.9">↓</option>
                  </select>
                </td>
                <td>
                  <select class="form-control" id="rank-modifier-spAttack">
                    <option value="6">6</option>
                    <option value="5">5</option>
                    <option value="4">4</option>
                    <option value="3">3</option>
                    <option value="2">2</option>
                    <option value="1">1</option>
                    <option value="0" selected>0</option>
                    <option value="-1">-1</option>
                    <option value="-2">-2</option>
                    <option value="-3">-3</option>
                    <option value="-4">-4</option>
                    <option value="-5">-5</option>
                    <option value="-6">-6</option>
                  </select>
                </td>
                <td id="result-spAttack" class="font-weight-bold" style="color:var(--primary-color);"></td>
              </tr>
              <!-- 특방 -->
              <tr>
                <th scope="row">특방</th>
                <td><input type="number" id="base-spDefense" class="form-control"></td>
                <td><input type="number" id="iv-spDefense" class="form-control" value="31" min="0" max="31"></td>
                <td class="col-2">
                  <div class="input-group">
                    <input type="number" id="ev-spDefense" class="form-control" value="0" min="0" max="252">
                    <div class="input-group-append">
                      <button class="btn btn-outline-secondary btn-sm" type="button" id="ev-spDefense-min">0</button>
                      <button class="btn btn-outline-secondary btn-sm" type="button" id="ev-spDefense-max">252</button>
                    </div>
                  </div>
                </td>
                <td>
                  <select class="form-control" id="nature-modifier-spDefense">
                    <option value="1.1">↑</option>
                    <option value="1.0" selected>-</option>
                    <option value="0.9">↓</option>
                  </select>
                </td>
                <td>
                  <select class="form-control" id="rank-modifier-spDefense">
                    <option value="6">6</option>
                    <option value="5">5</option>
                    <option value="4">4</option>
                    <option value="3">3</option>
                    <option value="2">2</option>
                    <option value="1">1</option>
                    <option value="0" selected>0</option>
                    <option value="-1">-1</option>
                    <option value="-2">-2</option>
                    <option value="-3">-3</option>
                    <option value="-4">-4</option>
                    <option value="-5">-5</option>
                    <option value="-6">-6</option>
                  </select>
                </td>
                <td id="result-spDefense" class="font-weight-bold" style="color:var(--primary-color);"></td>
              </tr>
              <!-- 스핏 -->
              <tr>
                <th scope="row">스피드</th>
                <td><input type="number" id="base-speed" class="form-control"></td>
                <td><input type="number" id="iv-speed" class="form-control" value="31" min="0" max="31"></td>
                <td class="col-2">
                  <div class="input-group">
                    <input type="number" id="ev-speed" class="form-control" value="0" min="0" max="252">
                    <div class="input-group-append">
                      <button class="btn btn-outline-secondary btn-sm" type="button" id="ev-speed-min">0</button>
                      <button class="btn btn-outline-secondary btn-sm" type="button" id="ev-speed-max">252</button>
                    </div>
                  </div>
                </td>
                <td>
                  <select class="form-control" id="nature-modifier-speed">
                    <option value="1.1">↑</option>
                    <option value="1.0" selected>-</option>
                    <option value="0.9">↓</option>
                  </select>
                </td>
                <td>
                  <select class="form-control" id="rank-modifier-speed">
                    <option value="6">6</option>
                    <option value="5">5</option>
                    <option value="4">4</option>
                    <option value="3">3</option>
                    <option value="2">2</option>
                    <option value="1">1</option>
                    <option value="0" selected>0</option>
                    <option value="-1">-1</option>
                    <option value="-2">-2</option>
                    <option value="-3">-3</option>
                    <option value="-4">-4</option>
                    <option value="-5">-5</option>
                    <option value="-6">-6</option>
                  </select>
                </td>
                <td id="result-speed" class="font-weight-bold" style="color:var(--primary-color);"></td>
              </tr>
