<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>PoDB</title>
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">PoDB</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item active">
          <a class="nav-link" href="index.html">포켓몬 검색</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="move-search.html">기술 검색</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="stats-calculator.html">실능 계산</a>
        </li>
      </ul>
      <ul class="navbar-nav ml-auto">
        <li class="nav-item">
          <button id="theme-toggle" class="btn btn-outline-secondary btn-sm rounded-circle shadow-sm"
            style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-moon"></i>
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="text-center mb-5">
      <h1 class="font-weight-bold" style="color: var(--primary-color);">SV 포켓몬 도감</h1>
      <div class="mt-3">
        <button type="button" class="btn btn-info btn-sm rounded-pill px-3 shadow-sm" data-toggle="modal"
          data-target="#helpModal">
          <i class="fas fa-question-circle"></i> 도움말
        </button>
        <a href="index_usum.html" class="btn btn-warning btn-sm rounded-pill px-3 ml-2 shadow-sm font-weight-bold"
          style="color: #fff;">7세대(USUM) 도감으로 이동</a>
      </div>
    </div>
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 mb-3 mb-md-0">
        <input type="text" id="search" class="form-control form-control-lg shadow-sm" placeholder="포켓몬 이름을 입력하세요..."
          autocomplete="off" style="border-radius: 30px; padding-left: 25px;">
      </div>
      <div class="col-12 col-md-2">
        <button id="search-button" class="btn btn-primary btn-lg w-100 shadow-sm"
          style="border-radius: 30px; font-weight: bold;">검색</button>
      </div>
    </div>

    <!-- 검색 결과 표시-->
    <div id="result" class="result-container mt-4"></div>

  </div>

  <footer class="text-center mt-5 mb-4">
    <div class="creator-info">문의 : lmisdreavus@gmail.com</div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.9.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="theme.js"></script>
  <script src="updates.js"></script>
  <script src="modal.js"></script>
</body>

</html>
