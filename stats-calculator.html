<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        @media (max-width: 576px) {
            input[type="number"] {
                font-size: 14px;
                padding: 4px;
            }
        }

        /* 모바일 화면 대응 */
        @media (max-width: 576px) {

            /* 입력 필드 크기 조정 */
            input[type="number"] {
                font-size: 14px;
                padding: 4px;
            }

            /* 테이블 셀 크기 조정 */
            .table th,
            .table td {
                font-size: 14px;
                padding: 4px;
            }

            /* 버튼 크기 조정 */
            .btn {
                font-size: 14px;
                padding: 4px 8px;
            }

            /* 드롭다운 메뉴 크기 조정 */
            .form-control {
                font-size: 14px;
                padding: 4px;
            }

            /* 포켓몬 이름 입력 필드와 검색 버튼 크기 조정 */
            #pokemon-name-input {
                font-size: 14px;
                padding: 4px;
            }

            #search-btn {
                font-size: 14px;
                padding: 4px 8px;
            }

            /* 레벨 입력 필드와 버튼 크기 조정 */
            #level-input {
                font-size: 14px;
                padding: 4px;
            }

            #level-50,
            #level-100 {
                font-size: 14px;
                padding: 4px 8px;
            }

            /* 계산 버튼 크기 조정 */
            #calculate-btn {
                font-size: 14px;
                padding: 4px 8px;
            }

            /* 좌측 카테고리 스타일 개선 */
            .table th {
                white-space: nowrap;
                text-align: center;
                vertical-align: middle;
            }

            /* 상단 카테고리 스타일 개선 */
            .table thead th {
                white-space: nowrap;
                text-align: center;
                vertical-align: middle;
            }

            /* 테이블 셀 가운데 정렬 */
            .table td {
                text-align: center;
                vertical-align: middle;
            }

            /* 입력 필드 가운데 정렬 */
            .table input[type="number"] {
                text-align: center;
            }

            /* 드롭다운 메뉴 가운데 정렬 */
            .table select.form-control {
                text-align-last: center;
            }

            body {
                padding-bottom: 50px;
            }

            /* 페이지 위로 당기기 */
            .container {
                margin-top: 50px;
            }

            /* 모바일 화면 대응 */
            @media (max-width: 576px) {
                /* ... */

                /* 전체 레이아웃 아래 여백 조정 */
                body {
                    padding-bottom: 30px;
                }

                /* 페이지 위로 당기기 조정 */
                .container {
                    margin-top: 30px;
                }
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">PoDB</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">포켓몬 검색</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="move-search.html">기술 검색</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="stats-calculator.html">실능 계산</a>
                </li>
            </ul>
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <button id="theme-toggle" class="btn btn-outline-secondary btn-sm rounded-circle shadow-sm"

                </li>

        </div>

    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1 class="font-weight-bold" style="color: var(--primary-color);">SV 실능치 계산기</h1>
        </div>
        <div class="card p-4 shadow-sm" style="border-radius: 16px;">
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label for="level-input" class="font-weight-bold">레벨:</label>
                    <div class="input-group">
                        <input type="number" id="level-input" class="form-control" value="50" min="1" max="100"
                            style="border-radius: 8px 0 0 8px;">
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary" type="button" id="level-50">50</button>
                            <button class="btn btn-outline-secondary" type="button" id="level-100"
                                style="border-radius: 0 8px 8px 0;">100</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-5 mb-4">
                    <label for="pokemon-name-input" class="font-weight-bold">포켓몬 이름:</label>
                    <div class="input-group">
                        <input type="text" id="pokemon-name-input" class="form-control shadow-sm"
                            placeholder="포켓몬 이름을 입력하세요" style="border-radius: 8px 0 0 8px;">
                        <div class="input-group-append">
                            <button class="btn btn-primary shadow-sm" id="search-btn"
                                style="border-radius: 0 8px 8px 0; font-weight:bold;">검색</button>
                        </div>
                    </div>
                    <!-- 유사 결과 리스트 -->
                    <div class="list-group position-absolute top-100" id="pokemon-search-results"
                        style="width: 100%; z-index: 1000; display: none;"></div>
                </div>
            </div>



            <!-- 능력치 입력과 결과를 표시하는 테이블 -->
            <table class="table">
                <thead>
                    <tr>
                        <th scope="col"></th>
                        <th scope="col">종족값</th>
                        <th scope="col">개체값</th>
                        <th scope="col">노력치</th>
                        <th scope="col">성격</th>
                        <th scope="col">랭크</th>
                        <th scope="col">실수치</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th class="col-1.5" scope="row">체력</th>
                        <td class="col-2"><input type="number" id="base-hp" class="form-control"></td>
                        <td class="col-2"><input type="number" id="iv-hp" class="form-control" value="31" min="0"
                                max="31"></td>
                        <td class="col-2">
                            <div class="input-group">
                                <input type="number" id="ev-hp" class="form-control" value="0" min="0" max="252">
                                <div class="input-group-append">
                                    <button class="btn btn-outline-secondary btn-sm" type="button"
                                        id="ev-hp-min">0</button>
                                    <button class="btn btn-outline-secondary btn-sm" type="button"
                                        id="ev-hp-max">252</button>
                                </div>
                            </div>
                        </td>
                        <td class="col-2"></td>
                        <td class="col-2"></td>
                        <td id="result-hp"></td>
                    </tr>
                    <tr>
                        <th scope="row">공격</th>
                        <td><input type="number" id="base-attack" class="form-control"></td>
                        <td><input type="number" id="iv-attack" class="form-control" value="31" min="0" max="31"></td>
                        <td class="col-2">
                            <div class="input-group">
                                <input type="number" id="ev-attack" class="form-control" value="0" min="0" max="252">
                                <div class="input-group-append">
                                    <button class="btn btn-outline-secondary btn-sm" type="button"
                                        id="ev-attack-min">0</button>
                                    <button class="btn btn-outline-secondary btn-sm" type="button"
                                        id="ev-attack-max">252</button>
                                </div>
                            </div>
                        </td>
                        <td>
                            <select class="form-control" id="nature-modifier-attack">
                                <option value="1.1">↑</option>
                                <option value="1.0" selected>-</option>
                                <option value="0.9">↓</option>
                            </select>
                        </td>
                        <td>
                            <select class="form-control" id="rank-modifier-attack">
                                <option value="6">6</option>
                                <option value="5">5</option>
                                <option value="4">4</option>
                                <option value="3">3</option>
                                <option value="2">2</option>
                                <option value="1">1</option>
                                <option value="0" selected>0</option>
                                <option value="-1">-1</option>
                                <option value="-2">-2</option>
                                <option value="-3">-3</option>
                                <option value="-4">-4</option>
                                <option value="-5">-5</option>
                                <option value="-6">-6</option>
                            </select>
                        </td>
                        <td id="result-attack"></td>
                    </tr>
                    <tr>
                        <th scope="row">방어</th>
                        <td><input type="number" id="base-defense" class="form-control"></td>
                        <td><input type="number" id="iv-defense" class="form-control" value="31" min="0" max="31"></td>
                        <td class="col-2">
                            <div class="input-group">
                                <input type="number" id="ev-defense" class="form-control" value="0" min="0" max="252">
                                <div class="input-group-append">
                                    <button class="btn btn-outline-secondary btn-sm" type="button"
                                        id="ev-defense-min">0</button>
                                    <button class="btn btn-outline-secondary btn-sm" type="button"
                                        id="ev-defense-max">252</button>
                                </div>
                            </div>
                        </td>
                        <td>
                            <select class="form-control" id="nature-modifier-defense">
                                <option value="1.1">↑</option>
                                <option value="1.0" selected>-</option>
                                <option value="0.9">↓</option>
                            </select>
                        </td>
                        <td>
                            <select class="form-control" id="rank-modifier-defense">
                                <option value="6">6</option>
                                <option value="5">5</option>
                                <option value="4">4</option>
                                <option value="3">3</option>
                                <option value="2">2</option>
                                <option value="1">1</option>
                                <option value="0" selected>0</option>
                                <option value="-1">-1</option>
                                <option value="-2">-2</option>
                                <option value="-3">-3</option>
                                <option value="-4">-4</option>
                                <option value="-5">-5</option>
                                <option value="-6">-6</option>
                            </select>
                        </td>
                        <td id="result-defense"></td>
                    </tr>
                    <tr>
                        <th scope="row">특공</th>
                        <td><input type="number" id="base-spAttack" class="form-control"></td>
                        <td><input type="number" id="iv-spAttack" class="form-control" value="31" min="0" max="31"></td>
                        <td class="col-2">
                            <div class="input-group">
                                <input type="number" id="ev-spAttack" class="form-control" value="0" min="0" max="252">
                                <div class="input-group-append">
                                    <button class="btn btn-outline-secondary btn-sm" type="button"

                                    <button class="btn btn-outline-secondary btn-sm" type="button"
                                        id="ev-spAttack-max">252</button>
                                </div>
                            </div>
                        </td>
                        <td>
                            <select class="form-control" id="nature-modifier-spAttack">
                                <option value="1.1">↑</option>
                                <option value="1.0" selected>-</option>
                                <option value="0.9">↓</option>
                            </select>
                        </td>
                        <td>
                            <select class="form-control" id="rank-modifier-spAttack">
                                <option value="6">6</option>
                                <option value="5">5</option>
                                <option value="4">4</option>
                                <option value="3">3</option>
                                <option value="2">2</option>
                                <option value="1">1</option>
                                <option value="0" selected>0</option>
                                <option value="-1">-1</option>
                                <option value="-2">-2</option>
                                <option value="-3">-3</option>
                                <option value="-4">-4</option>
                                <option value="-5">-5</option>
                                <option value="-6">-6</option>
                            </select>
                        </td>
                        <td id="result-spAttack"></td>
                    </tr>
                    <tr>
                        <th scope="row">특방</th>
                        <td><input type="number" id="base-spDefense" class="form-control"></td>
                        <td><input type="number" id="iv-spDefense" class="form-control" value="31" min="0" max="31">
                        </td>
                        <td class="col-2">
                            <div class="input-group">
                                <input type="number" id="ev-spDefense" class="form-control" value="0" min="0" max="252">
                                <div class="input-group-append">
                                    <button class="btn btn-outline-secondary btn-sm" type="button"
                                        id="ev-spDefense-min">0</button>
                                    <button class="btn btn-outline-secondary btn-sm" type="button"
                                        id="ev-spDefense-max">252</button>
                                </div>
                            </div>
                        </td>
                        <td>
                            <select class="form-control" id="nature-modifier-spDefense">
                                <option value="1.1">↑</option>
                                <option value="1.0" selected>-</option>
                                <option value="0.9">↓</option>
                            </select>
                        </td>
                        <td>
                            <select class="form-control" id="rank-modifier-spDefense">
                                <option value="6">6</option>
                                <option value="5">5</option>
                                <option value="4">4</option>
                                <option value="3">3</option>
                                <option value="2">2</option>
                                <option value="1">1</option>
                                <option value="0" selected>0</option>
                                <option value="-1">-1</option>
                                <option value="-2">-2</option>
                                <option value="-3">-3</option>
                                <option value="-4">-4</option>
                                <option value="-5">-5</option>
                                <option value="-6">-6</option>
                            </select>
                        </td>
                        <td id="result-spDefense"></td>
                    </tr>
                    <tr>
                        <th scope="row">스핏</th>
                        <td><input type="number" id="base-speed" class="form-control"></td>
                        <td><input type="number" id="iv-speed" class="form-control" value="31" min="0" max="31"></td>
                        <td class="col-2">
                            <div class="input-group">
                                <input type="number" id="ev-speed" class="form-control" value="0" min="0" max="252">
                                <div class="input-group-append">
                                    <button class="btn btn-outline-secondary btn-sm" type="button"
                                        id="ev-speed-min">0</button>
                                    <button class="btn btn-outline-secondary btn-sm" type="button"
                                        id="ev-speed-max">252</button>
                                </div>
                            </div>
                        </td>
                        <td>
                            <select class="form-control" id="nature-modifier-speed">
                                <option value="1.1">↑</option>
                                <option value="1.0" selected>-</option>
                                <option value="0.9">↓</option>
                            </select>
                        </td>
                        <td>
                            <select class="form-control" id="rank-modifier-speed">
                                <option value="6">6</option>
                                <option value="5">5</option>
                                <option value="4">4</option>
                                <option value="3">3</option>
                                <option value="2">2</option>
                                <option value="1">1</option>
                                <option value="0" selected>0</option>
                                <option value="-1">-1</option>
                                <option value="-2">-2</option>
                                <option value="-3">-3</option>
                                <option value="-4">-4</option>
                                <option value="-5">-5</option>
                                <option value="-6">-6</option>
                            </select>
                        </td>
                        <td id="result-speed"></td>
                    </tr>
                    <!-- 공격, 방어, 특수공격, 특수방어, 스피드에 대한 행을 동일한 방식으로 추가 -->
                    <!-- ... 추가 행 ... -->
                </tbody>
            </table>

        </div>
    </div>

</body>
